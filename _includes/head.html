<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>
<meta name="description" content="{{ page.description }}">
<link href="{{ page.base }}style.css?5" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Playfair+Display+SC:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900" rel="stylesheet">
<link rel="icon" type="image/png" href="{{ page.base }}img/favicon.png" sizes="32x32">
<link rel="icon" type="image/svg+xml" href="{{ page.base }}img/favicon.svg">
<link rel="icon" type="image/x-icon" href="{{ page.base }}img/favicon.ico">
{% if page.lang == 'fr' %}
<link rel="alternate" hreflang="en" href="https://groupeventclair.com/">
<link rel="alternate" hreflang="fr" href="https://groupeventclair.com/fr/">
{% else %}
<link rel="alternate" hreflang="en" href="https://groupeventclair.com/">
<link rel="alternate" hreflang="fr" href="https://groupeventclair.com/fr/">
{% endif %}
<meta property="og:title" content="{{ page.title }}">
<meta property="og:description" content="{{ page.description }}">
<meta property="og:type" content="website">
<meta property="og:locale" content="{% if page.lang == 'fr' %}fr_CA{% else %}en_CA{% endif %}">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "HomeAndConstructionBusiness",
  "name": "{{ site.data.site.title }}",
  "url": "https://groupeventclair.com",
  "logo": "https://groupeventclair.com/img/logo.avif",
  "image": "https://groupeventclair.com/img/hero.avif",
  "description": "{{ site.data.site.description }}",
  "telephone": "{{ site.data.site.phone | replace: ' ', '' | replace: '(', '' | replace: ')', '' | replace: '-', '' }}",
  "email": "{{ site.data.site.email }}",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "{{ site.data.site.address.street }}",
    "addressLocality": "{{ site.data.site.address.city }}",
    "addressRegion": "{{ site.data.site.address.province }}",
    "postalCode": "{{ site.data.site.address.postal }}",
    "addressCountry": "CA"
  },
  "geo": {
    "@type": "GeoCoordinates",
    "latitude": 45.4715,
    "longitude": -73.6307
  },
  "areaServed": {
    "@type": "GeoCircle",
    "geoMidpoint": { "@type": "GeoCoordinates", "latitude": 45.5017, "longitude": -73.5673 },
    "geoRadius": "100000"
  },
  "priceRange": "$$$$",
  "openingHours": "Mo-Fr 09:00-17:00",
  "sameAs": [
    "{{ site.data.site.social.facebook }}",
    "{{ site.data.site.social.instagram }}"
  ]
}
</script>
{% include ga.html %}
