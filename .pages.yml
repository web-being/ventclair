media:
  input: img/portfolio
  output: img/portfolio

settings:
  hide: true
  content:
    merge: false

components:
  locale:
    type: object
    fields:
      - name: title
        label: Title
        type: string
      - name: location
        label: Location
        type: string
      - name: address
        label: Address
        type: string
      - name: type
        label: Type
        type: select
        options:
          values:
            - Single-family Home
            - Multifamily Residential
      - name: description
        label: Description
        type: text
      - name: specs
        label: "Specs (one per line, Label: Value)"
        type: text

content:
  - name: info
    label: Site Info
    path: _config.yml
    type: file
    fields:
      - name: title
        label: Company Name
        type: string
      - name: description
        label: Description
        type: text
      - name: phone
        label: Phone
        type: string
      - name: email
        label: Email
        type: string
      - name: address
        label: Address
        type: object
        fields:
          - name: street
            label: Street
            type: string
          - name: city
            label: City
            type: string
          - name: province
            label: Province
            type: string
          - name: postal
            label: Postal Code
            type: string
      - name: social
        label: Social Links
        type: object
        fields:
          - name: facebook
            label: Facebook
            type: string
          - name: instagram
            label: Instagram
            type: string

  - name: projects
    label: Projects
    path: _projects
    type: collection
    view:
      fields: [slug, order]
      sort: [order]
    fields:
      - name: order
        label: Display Order
        type: number
      - name: slug
        label: Slug
        type: string
      - name: cover
        label: Cover Image
        type: image
      - name: images
        label: Images
        type: image
        list: true
      - name: en
        label: English
        component: locale
      - name: fr
        label: French
        component: locale
